name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pinned exact; Renovate bumps it.
      - run: pip install mkdocs-material==9.7.6
      # docs_dir is the repo root, so the site must build OUTSIDE it.
      - run: mkdocs build -f repo/mkdocs.yml --strict -d "${GITHUB_WORKSPACE}/site"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
