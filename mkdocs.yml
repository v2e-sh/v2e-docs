site_name: v2e.sh — Lab Documentation
site_description: Deploy and operate the v2e homelab (Proxmox · VyOS · OpenTofu · Ansible · Docker)
site_url: https://v2e-sh.github.io/v2e-docs/
repo_url: https://github.com/v2e-sh/v2e-docs
repo_name: v2e-sh/v2e-docs
edit_uri: edit/main/

# The real markdown lives at the repo root (cross-repo references depend on those
# paths); docs/ is a symlink tree selecting the HUMAN-FACING pages only. Session/
# planning artifacts (HANDOVER, MASTER-PLAN, deviations, plans/) are deliberately
# not linked — they are not part of the site.

nav:
  - Home: index.md
  - Runbook: RUNBOOK.md
  - Configuration reference: CONFIGURATION.md
  - System:
      - Architecture overview: system/architecture.md
      - Network, VLANs & firewall: system/networking.md
      - Application estate: system/applications.md
      - Tailscale, exit nodes & DNS: system/tailscale-dns.md
      - Secrets & SOPS flow: system/secrets.md
      - Deploy & bootstrap lifecycle: system/lifecycle.md
      - Observability & alerting: system/observability.md
  - Design specs:
      - VM templates: specs/2026-06-30-packer-templates-design.md
      - Traefik + TLS: specs/2026-06-30-compose-traefik-tls-design.md
      - Auth (TinyAuth): specs/2026-06-30-compose-auth-design.md
      - DNS appliance: specs/2026-06-30-dns-appliance-design.md
  - Audits:
      - "2026-07-03": audits/AUDIT-2026-07-03.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/brand/logo-header.svg
  favicon: assets/brand/favicon.svg
  font:
    text: Inter
    code: Martian Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - assets/brand.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
