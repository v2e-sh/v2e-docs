{% extends "base.html" %}

{#- v2e.sh branding: Open Graph / Twitter link-preview card + theme color. -#}
{% block extrahead %}
  {% set og_image = (config.site_url or '') ~ 'assets/brand/og-image.png' %}
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default(config.site_name) }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:image" content="{{ og_image }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ og_image }}">
  <meta name="theme-color" content="#212121">
  <link rel="apple-touch-icon" href="{{ 'assets/brand/apple-touch-icon.png' | url }}">
{% endblock %}
